services:
  vieneu-tts:
    image: pnnbao/vieneu-tts:latest
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    command: ["--tunnel"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  minio:
    image: minio/minio:latest
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: p@ssw0rd
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 admin p@ssw0rd &&
        mc mb --ignore-existing local/tts-output &&
        mc anonymous set none local/tts-output
      "

  synthesize:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - REMOTE_API_BASE=http://vieneu-tts:23333/v1
      - REMOTE_MODEL_ID=pnnbao-ump/VieNeu-TTS-v2
      - DEFAULT_EMOTION=natural
      - DEFAULT_VOICE=Doan
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=p@ssw0rd
      - MINIO_BUCKET=tts-output
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-}
      - API_KEY=${API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      vieneu-tts:
        condition: service_started
      minio:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN_FILE=/run/secrets/cloudflare_tunnel_token
    secrets:
      - cloudflare_tunnel_token
    depends_on:
      synthesize:
        condition: service_healthy

secrets:
  cloudflare_tunnel_token:
    file: ./secrets/cloudflare_tunnel_token.txt

volumes:
  huggingface_cache:
  minio_data:
